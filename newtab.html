<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星火篝火番茄钟</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="watch">
      <canvas id="scene" aria-label="互动星空篝火时钟"></canvas>

      <div id="webglFallback" class="webgl-fallback" hidden>
        <p>3D 场景暂时无法加载，番茄钟仍可正常使用。</p>
      </div>

      <section class="hud" aria-label="时钟与番茄钟">
        <div id="signal" class="signal">Campfire clock</div>
        <time id="clock" class="clock">00:00:00</time>
        <div id="date" class="date">正在校准星图</div>

        <div id="pomodoroPanel" class="pomodoro-panel" hidden>
          <div id="pomodoroStatus" class="pomodoro-status"></div>
          <div id="pomodoroCountdown" class="pomodoro-countdown" aria-live="polite" aria-atomic="true">25:00</div>
          <div id="pomodoroActions" class="pomodoro-actions"></div>
        </div>
      </section>

      <button id="startFocusButton" class="start-focus-button" type="button" aria-label="打开番茄钟设置">
        🍅 番茄钟
      </button>

      <button id="settingsButton" class="settings-button" type="button" aria-label="打开番茄钟设置">⚙</button>

      <button id="debugPhaseButton" class="debug-phase-button" type="button" title="调试：切换专注/短休息">
        调试 → 专注
      </button>

      <button id="focusButton" class="focus-button" type="button" aria-label="回到篝火视角">
        <span aria-hidden="true">⌖</span>
      </button>

      <div id="settingsOverlay" class="settings-overlay" hidden inert aria-hidden="true">
        <div class="settings-panel" role="dialog" aria-labelledby="settingsTitle" aria-modal="true">
          <h2 id="settingsTitle">番茄钟设置</h2>
          <form id="settingsForm" class="settings-form">
            <label class="field">
              <span>专注时长（分钟）</span>
              <div class="stepper">
                <button type="button" data-step="focusMinutes" data-delta="-1" aria-label="减少专注时长">−</button>
                <input id="focusMinutes" name="focusMinutes" type="number" min="5" max="90" step="1" value="25" />
                <button type="button" data-step="focusMinutes" data-delta="1" aria-label="增加专注时长">+</button>
              </div>
            </label>
            <label class="field">
              <span>短休息（分钟）</span>
              <div class="stepper">
                <button type="button" data-step="shortBreakMinutes" data-delta="-1" aria-label="减少短休息">−</button>
                <input id="shortBreakMinutes" name="shortBreakMinutes" type="number" min="1" max="30" step="1" value="5" />
                <button type="button" data-step="shortBreakMinutes" data-delta="1" aria-label="增加短休息">+</button>
              </div>
            </label>
            <label class="field">
              <span>长休息（分钟）</span>
              <div class="stepper">
                <button type="button" data-step="longBreakMinutes" data-delta="-1" aria-label="减少长休息">−</button>
                <input id="longBreakMinutes" name="longBreakMinutes" type="number" min="5" max="45" step="1" value="15" />
                <button type="button" data-step="longBreakMinutes" data-delta="1" aria-label="增加长休息">+</button>
              </div>
            </label>
            <label class="field">
              <span>几轮后长休息</span>
              <div class="stepper">
                <button type="button" data-step="cyclesBeforeLong" data-delta="-1" aria-label="减少轮数">−</button>
                <input id="cyclesBeforeLong" name="cyclesBeforeLong" type="number" min="2" max="8" step="1" value="4" />
                <button type="button" data-step="cyclesBeforeLong" data-delta="1" aria-label="增加轮数">+</button>
              </div>
            </label>
            <label class="toggle">
              <input id="autoStartNext" name="autoStartNext" type="checkbox" />
              <span>休息结束自动开始下一轮</span>
            </label>
            <label class="toggle">
              <input id="soundEnabled" name="soundEnabled" type="checkbox" checked />
              <span>专注/休息结束提示音</span>
            </label>
            <label class="toggle">
              <input id="notifyEnabled" name="notifyEnabled" type="checkbox" checked />
              <span>浏览器通知（标签在后台时）</span>
            </label>
            <label class="toggle">
              <input id="manualRoastEnabled" name="manualRoastEnabled" type="checkbox" checked />
              <span>保留手动双击烤棉花糖</span>
            </label>
            <div class="settings-actions">
              <button type="button" id="resetSettingsButton" class="btn-secondary">恢复默认</button>
              <button type="button" id="saveSettingsButton" class="btn-secondary">保存</button>
              <button type="button" id="saveAndStartButton" class="btn-primary">保存并开始专注</button>
            </div>
          </form>
          <button type="button" id="closeSettingsButton" class="settings-close" aria-label="关闭设置">×</button>
        </div>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>
    <script type="module" src="./newtab-main.js"></script>
  </body>
</html>
