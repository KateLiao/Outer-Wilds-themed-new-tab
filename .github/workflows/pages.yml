name: Deploy demo

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source and build bundle
        run: npm run check

      - name: Prepare demo artifact
        run: |
          mkdir demo
          cp newtab.html demo/index.html
          cp index.html styles.css newtab-main.js feature-settings.js todo.js quick-links.js read-later.js pomodoro.js pomodoro-ui.js confirm-dialog.js audio.js storage-adapter.js demo/
          cp -R dist assets icons demo/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
